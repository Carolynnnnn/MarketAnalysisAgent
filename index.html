<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand Market Analysis Agent</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6ee7f7, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    header p {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      align-items: flex-start;
    }

    .search-wrapper {
      flex: 1;
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #6ee7f7;
    }

    input[type="text"]::placeholder {
      color: #4a5568;
    }

    #suggestDropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 10px;
      z-index: 200;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .suggest-item {
      padding: 10px 16px;
      color: #cbd5e1;
      cursor: pointer;
      font-size: 0.9rem;
      border-bottom: 1px solid #2d3148;
      transition: background 0.15s, color 0.15s;
    }

    .suggest-item:last-child {
      border-bottom: none;
    }

    .suggest-item:hover {
      background: #2d3148;
      color: #6ee7f7;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 12px 22px;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:active {
      transform: scale(0.97);
    }

    #startBtn {
      background: linear-gradient(135deg, #6ee7f7, #a78bfa);
      color: #0f1117;
      white-space: nowrap;
    }

    #startBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Loading status */
    #statusArea {
      display: none;
      align-items: center;
      gap: 12px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 24px;
    }

    #statusArea.active {
      display: flex;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #2d3148;
      border-top-color: #6ee7f7;
      border-radius: 50%;
      flex-shrink: 0;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #statusText {
      color: #94a3b8;
      font-size: 0.9rem;
      transition: opacity 0.3s;
    }

    .progress-bar-track {
      height: 4px;
      background: #2d3148;
      border-radius: 999px;
      margin-top: 12px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6ee7f7, #a78bfa);
      border-radius: 999px;
      transition: width 1.2s ease;
    }

    /* Results */
    #resultsSection {
      display: none;
    }

    #resultsSection.visible {
      display: block;
    }

    #resultsSection h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    #resultsPreview {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 20px;
      font-size: 0.88rem;
      line-height: 1.7;
      color: #cbd5e1;
      white-space: pre-wrap;
      min-height: 120px;
      margin-bottom: 16px;
    }

    #scoreBreakdown {
      display: none;
      margin-bottom: 20px;
    }

    #scoreBreakdown.visible {
      display: block;
    }

    #scoreBreakdown h3 {
      font-size: 0.78rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .score-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 0.82rem;
    }

    .score-label {
      width: 160px;
      flex-shrink: 0;
      color: #94a3b8;
    }

    .score-bar-track {
      flex: 1;
      height: 6px;
      background: #2d3148;
      border-radius: 999px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #6ee7f7, #a78bfa);
      transition: width 0.8s ease;
    }

    .score-num {
      width: 36px;
      text-align: right;
      color: #e2e8f0;
      font-weight: 600;
      flex-shrink: 0;
    }

    .score-weight {
      width: 38px;
      text-align: right;
      color: #4a5568;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    #trendRationale {
      display: none;
      margin-bottom: 20px;
    }

    #trendRationale.visible {
      display: block;
    }

    #trendRationale h3 {
      font-size: 0.78rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .trend-row {
      display: flex;
      gap: 10px;
      padding: 8px 12px;
      margin-bottom: 6px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      font-size: 0.82rem;
    }

    .trend-indicator {
      width: 130px;
      flex-shrink: 0;
      color: #6ee7f7;
      font-weight: 600;
    }

    .trend-detail {
      color: #94a3b8;
      line-height: 1.5;
    }

    .trend-verdict {
      margin-top: 10px;
      padding: 10px 14px;
      background: #1e2130;
      border-left: 3px solid #a78bfa;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #cbd5e1;
      font-style: italic;
    }


    #referencesSection {
      display: none;
      margin-bottom: 20px;
    }

    #referencesSection.visible { display: block; }

    #referencesSection h3 {
      font-size: 0.78rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .ref-item {
      display: grid;
      grid-template-columns: 36px 40px 1fr auto;
      gap: 0 10px;
      align-items: start;
      padding: 10px 12px;
      margin-bottom: 6px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      font-size: 0.8rem;
    }

    .ref-id {
      color: #4a5568;
      font-weight: 700;
      font-size: 0.75rem;
      padding-top: 2px;
    }

    .ref-dim {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 700;
      text-align: center;
      align-self: start;
    }

    .ref-dim.D1 { background: #1e3a8a; color: #93c5fd; }
    .ref-dim.D2 { background: #3b0764; color: #d8b4fe; }
    .ref-dim.D3 { background: #0c4a6e; color: #7dd3fc; }
    .ref-dim.D4 { background: #064e3b; color: #6ee7b7; }
    .ref-dim.D5 { background: #451a03; color: #fcd34d; }
    .ref-dim.general { background: #1e2130; color: #94a3b8; }

    .ref-body { min-width: 0; }
    .ref-claim {
      color: #cbd5e1;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .ref-source { color: #6ee7f7; font-weight: 600; margin-bottom: 2px; }
    .ref-url a {
      color: #4a5568;
      font-size: 0.72rem;
      text-decoration: none;
      word-break: break-all;
    }
    .ref-url a:hover { color: #94a3b8; text-decoration: underline; }

    .ref-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; white-space: nowrap; }
    .ref-reliability {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .ref-reliability.high   { background: #052e16; color: #4ade80; }
    .ref-reliability.medium { background: #1c1a05; color: #facc15; }
    .ref-reliability.low    { background: #3b0764; color: #e879f9; }

    .ref-sourcetype {
      font-size: 0.68rem;
      color: #4a5568;
    }

    .ref-verify-warn {
      font-size: 0.68rem;
      color: #ca8a04;
    }

    .ref-disclaimer {
      margin-top: 10px;
      padding: 10px 14px;
      background: #1c1a05;
      border: 1px solid #854d0e;
      border-radius: 6px;
      font-size: 0.78rem;
      color: #92400e;
      line-height: 1.5;
    }

    #downloadBtn {
      display: none;
      width: 100%;
      background: #22c55e;
      color: #fff;
      padding: 13px;
      font-size: 0.95rem;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    #downloadBtn.visible {
      display: flex;
    }

    #downloadBtn:hover {
      opacity: 0.88;
    }

    .icon {
      font-style: normal;
    }

  </style>
</head>
<body>

  <header>
    <h1>Brand Market Analysis Agent</h1>
    <p>AI-powered brand intelligence &amp; PDF reporting</p>
  </header>

  <div class="card">

    <!-- Input -->
    <div class="input-group">
      <div class="search-wrapper">
        <input
          type="text"
          id="brandInput"
          placeholder="Enter brand name, e.g. Apple, Nike, Luckin Coffee"
          autocomplete="off"
        />
        <div id="suggestDropdown"></div>
      </div>
      <button id="startBtn" onclick="startAnalysis()">Start Analysis</button>
    </div>

    <!-- Loading status -->
    <div id="statusArea">
      <div class="spinner"></div>
      <div style="flex:1">
        <div id="statusText">Collecting data...</div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
      </div>
    </div>

    <!-- Results -->
    <div id="resultsSection">
      <h2>Analysis Preview</h2>
      <div id="resultsPreview"></div>

      <div id="scoreBreakdown">
        <h3>Sentiment Score Breakdown</h3>
        <div id="scoreRows"></div>
      </div>

      <div id="trendRationale">
        <h3>Market Trend Rationale</h3>
        <div id="trendRows"></div>
        <div class="trend-verdict" id="trendVerdict"></div>
      </div>

      <div id="referencesSection">
        <h3>References &amp; Source Verification</h3>
        <div id="referencesList"></div>
        <div class="ref-disclaimer" id="refDisclaimer"></div>
      </div>

      <button id="downloadBtn" onclick="downloadPDF()">
        <span class="icon">&#8675;</span> Download PDF Report
      </button>
    </div>

  </div>

  <script>
    const STEPS = [
      { label: "Collecting data...",       progress: 30 },
      { label: "Running Analysis...",      progress: 65 },
      { label: "Generating PDF Report...", progress: 90 },
    ];

    let stepTimer   = null;
    let currentStep = 0;
    let downloadUrl = "";

    // ── Autocomplete ────────────────────────────────────────────────────────────
    let suggestTimer = null;

    function closeSuggest() {
      const dd = document.getElementById('suggestDropdown');
      dd.style.display = 'none';
      dd.innerHTML = '';
    }

    function selectSuggestion(name) {
      document.getElementById('brandInput').value = name;
      closeSuggest();
      startAnalysis();
    }

    document.addEventListener('DOMContentLoaded', () => {
      const input = document.getElementById('brandInput');

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { closeSuggest(); startAnalysis(); }
        if (e.key === 'Escape') closeSuggest();
      });

      input.addEventListener('input', () => {
        const q = input.value.trim();
        clearTimeout(suggestTimer);
        if (q.length < 2) { closeSuggest(); return; }

        suggestTimer = setTimeout(async () => {
          try {
            const res = await fetch(`/api/suggest?q=${encodeURIComponent(q)}`);
            let { suggestions } = await res.json();
            const dd = document.getElementById('suggestDropdown');
            if (!suggestions || suggestions.length === 0) { closeSuggest(); return; }
            suggestions = suggestions.filter(s => s.toLowerCase().includes(q.toLowerCase()));
            if (suggestions.length === 0) { closeSuggest(); return; }
            dd.innerHTML = suggestions.map(s =>
              `<div class="suggest-item" onmousedown="selectSuggestion(${JSON.stringify(s)})">${s}</div>`
            ).join('');
            dd.style.display = 'block';
          } catch (_) { closeSuggest(); }
        }, 380);
      });

      input.addEventListener('blur', () => setTimeout(closeSuggest, 150));
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrapper')) closeSuggest();
    });

    // ── UI helpers ──────────────────────────────────────────────────────────
    function setStep(i) {
      document.getElementById("statusText").textContent = STEPS[i].label;
      document.getElementById("progressFill").style.width = STEPS[i].progress + "%";
    }

    function resetUI() {
      clearInterval(stepTimer);
      currentStep = 0;
      downloadUrl = "";
      document.getElementById("startBtn").disabled = false;
      document.getElementById("statusArea").classList.remove("active");
      document.getElementById("progressFill").style.width = "0%";
      document.getElementById("scoreBreakdown").classList.remove("visible");
      document.getElementById("trendRationale").classList.remove("visible");
      document.getElementById("referencesSection").classList.remove("visible");
    }

    async function startAnalysis() {
      const brand = document.getElementById("brandInput").value.trim();
      if (!brand) { document.getElementById("brandInput").focus(); return; }

      // Reset
      document.getElementById("startBtn").disabled = true;
      document.getElementById("resultsSection").classList.remove("visible");
      document.getElementById("downloadBtn").classList.remove("visible");
      document.getElementById("resultsPreview").textContent = "";
      currentStep = 0;

      // Animate status while waiting
      document.getElementById("statusArea").classList.add("active");
      setStep(0);
      stepTimer = setInterval(() => {
        if (currentStep < STEPS.length - 1) {
          currentStep++;
          setStep(currentStep);
        }
      }, 3500);

      try {
        const res  = await fetch("/analyze", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ brand }),
        });
        const data = await res.json();

        clearInterval(stepTimer);

        if (!res.ok || !data.success) {
          const err = new Error(data.error || "Unknown server error.");
          if (data.brandNotFound) { err.brandNotFound = true; err.brandName = brand; }
          throw err;
        }

        // Complete progress bar
        document.getElementById("progressFill").style.width = "100%";
        downloadUrl = data.downloadUrl;

        setTimeout(() => {
          document.getElementById("statusArea").classList.remove("active");
          document.getElementById("startBtn").disabled = false;

          const p = data.preview;
          const trendArrow = { growing: "↑", stable: "→", declining: "↓" }[p.marketTrend] || "";
          const lines = [
            `Brand: ${data.brand}`,
            `Sentiment Score: ${p.sentimentScore} / 100`,
            `Market Trend: ${trendArrow} ${p.marketTrend.toUpperCase()}`,
            ``,
            `Pricing: ${p.priceSummary}`,
            ``,
            `Competitive: ${p.competitiveSummary}`,
            ``,
            `Strategic Insights:`,
            ...p.strategicInsights.map((s) => `  • ${s}`),
            ``,
            `Recommendations:`,
            ...p.recommendations.map((r) => `  • ${r}`),
          ];

          document.getElementById("resultsPreview").textContent = lines.join("\n");

          // Render sentiment breakdown
          const bd = p.sentimentBreakdown || {};
          const LABELS = {
            consumerReputation:   "Consumer Reputation",
            marketPerformance:    "Market Performance",
            brandAwareness:       "Brand Awareness",
            priceCompetitiveness: "Price Competitiveness",
            channelCoverage:      "Channel Coverage",
          };
          const rows = Object.entries(LABELS).map(([key, label]) => {
            const dim = bd[key] || {};
            const score = dim.score ?? 0;
            const weight = dim.weight ? `×${(dim.weight * 100).toFixed(0)}%` : "";
            return `<div class="score-row">
              <span class="score-label">${label}</span>
              <div class="score-bar-track"><div class="score-bar-fill" style="width:${score}%"></div></div>
              <span class="score-num">${score}</span>
              <span class="score-weight">${weight}</span>
            </div>`;
          }).join("");
          document.getElementById("scoreRows").innerHTML = rows;
          document.getElementById("scoreBreakdown").classList.add("visible");

          // Render market trend rationale
          const tr = p.marketTrendRationale || {};
          const TREND_LABELS = {
            revenueGrowth:    "Revenue Growth",
            expansionSignals: "Expansion Signals",
            marketShare:      "Market Share",
            demandSignals:    "Demand Signals",
          };
          const trendRows = Object.entries(TREND_LABELS).map(([key, label]) =>
            `<div class="trend-row">
              <span class="trend-indicator">${label}</span>
              <span class="trend-detail">${tr[key] || "—"}</span>
            </div>`
          ).join("");
          document.getElementById("trendRows").innerHTML = trendRows;
          document.getElementById("trendVerdict").textContent = tr.verdict || "";
          document.getElementById("trendRationale").classList.add("visible");

          // Render references
          const rd = p.referencesData || {};
          const refs = rd.references || [];
          const SOURCE_TYPE_LABELS = {
            official_ir:     'Official IR',
            industry_report: 'Industry Report',
            regulatory:      'Regulatory',
            platform_data:   'Platform Data',
            news_media:      'News Media',
            estimated:       'Estimated',
          };
          if (refs.length > 0) {
            document.getElementById("referencesList").innerHTML = refs.map(r => `
              <div class="ref-item">
                <span class="ref-id">${r.id || ''}</span>
                <span class="ref-dim ${r.dimension || 'general'}">${r.dimension || '—'}</span>
                <div class="ref-body">
                  <div class="ref-claim">"${(r.claimExcerpt || '').slice(0, 120)}"</div>
                  <div class="ref-source">${r.source || ''}</div>
                  ${r.url ? `<div class="ref-url"><a href="${r.url}" target="_blank" rel="noopener">${r.url}</a></div>` : ''}
                </div>
                <div class="ref-meta">
                  <span class="ref-reliability ${r.reliability || 'low'}">${(r.reliability || '').toUpperCase()}</span>
                  <span class="ref-sourcetype">${SOURCE_TYPE_LABELS[r.sourceType] || r.sourceType || ''}</span>
                  ${r.needsVerification ? '<span class="ref-verify-warn">⚠ verify URL</span>' : ''}
                </div>
              </div>`).join('');
            document.getElementById("refDisclaimer").textContent = rd.disclaimer || '';
            document.getElementById("referencesSection").classList.add("visible");
          }

          document.getElementById("resultsSection").classList.add("visible");
          document.getElementById("downloadBtn").classList.add("visible");
        }, 500);

      } catch (err) {
        clearInterval(stepTimer);
        resetUI();
        document.getElementById("statusArea").classList.add("active");
        document.getElementById("progressFill").style.width = "0%";
        if (err.brandNotFound) {
          document.getElementById("statusText").textContent =
            `⚠️ Brand not recognised: "${err.brandName}". Please check the spelling or try a different brand.`;
        } else {
          document.getElementById("statusText").textContent = "Error: " + err.message;
        }
        setTimeout(resetUI, 6000);
      }
    }

    function downloadPDF() {
      if (downloadUrl) window.open(downloadUrl, "_blank");
    }
  </script>

</body>
</html>

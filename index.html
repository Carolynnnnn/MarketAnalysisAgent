<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand Market Analysis Agent</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6ee7f7, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    header p {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #6ee7f7;
    }

    input[type="text"]::placeholder {
      color: #4a5568;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 12px 22px;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:active {
      transform: scale(0.97);
    }

    #startBtn {
      background: linear-gradient(135deg, #6ee7f7, #a78bfa);
      color: #0f1117;
      white-space: nowrap;
    }

    #startBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Loading status */
    #statusArea {
      display: none;
      align-items: center;
      gap: 12px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 24px;
    }

    #statusArea.active {
      display: flex;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #2d3148;
      border-top-color: #6ee7f7;
      border-radius: 50%;
      flex-shrink: 0;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #statusText {
      color: #94a3b8;
      font-size: 0.9rem;
      transition: opacity 0.3s;
    }

    .progress-bar-track {
      height: 4px;
      background: #2d3148;
      border-radius: 999px;
      margin-top: 12px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6ee7f7, #a78bfa);
      border-radius: 999px;
      transition: width 1.2s ease;
    }

    /* Results */
    #resultsSection {
      display: none;
    }

    #resultsSection.visible {
      display: block;
    }

    #resultsSection h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    #resultsPreview {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 20px;
      font-size: 0.88rem;
      line-height: 1.7;
      color: #cbd5e1;
      white-space: pre-wrap;
      min-height: 120px;
      margin-bottom: 16px;
    }

    #scoreBreakdown {
      display: none;
      margin-bottom: 20px;
    }

    #scoreBreakdown.visible {
      display: block;
    }

    #scoreBreakdown h3 {
      font-size: 0.78rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .score-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 0.82rem;
    }

    .score-label {
      width: 160px;
      flex-shrink: 0;
      color: #94a3b8;
    }

    .score-bar-track {
      flex: 1;
      height: 6px;
      background: #2d3148;
      border-radius: 999px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #6ee7f7, #a78bfa);
      transition: width 0.8s ease;
    }

    .score-num {
      width: 36px;
      text-align: right;
      color: #e2e8f0;
      font-weight: 600;
      flex-shrink: 0;
    }

    .score-weight {
      width: 38px;
      text-align: right;
      color: #4a5568;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    #trendRationale {
      display: none;
      margin-bottom: 20px;
    }

    #trendRationale.visible {
      display: block;
    }

    #trendRationale h3 {
      font-size: 0.78rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .trend-row {
      display: flex;
      gap: 10px;
      padding: 8px 12px;
      margin-bottom: 6px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      font-size: 0.82rem;
    }

    .trend-indicator {
      width: 130px;
      flex-shrink: 0;
      color: #6ee7f7;
      font-weight: 600;
    }

    .trend-detail {
      color: #94a3b8;
      line-height: 1.5;
    }

    .trend-verdict {
      margin-top: 10px;
      padding: 10px 14px;
      background: #1e2130;
      border-left: 3px solid #a78bfa;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #cbd5e1;
      font-style: italic;
    }

    #qualityReport {
      display: none;
      margin-bottom: 20px;
    }

    #qualityReport.visible { display: block; }

    #qualityReport h3 {
      font-size: 0.78rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .quality-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .quality-header.pass  { background: #052e16; border: 1px solid #166534; }
    .quality-header.warn  { background: #1c1a05; border: 1px solid #854d0e; }
    .quality-header.retry { background: #0f172a; border: 1px solid #1e40af; }

    .quality-badge {
      font-size: 1.3rem;
      font-weight: 700;
      min-width: 44px;
      text-align: center;
    }

    .quality-badge.pass  { color: #4ade80; }
    .quality-badge.warn  { color: #facc15; }

    .quality-meta { flex: 1; }
    .quality-meta .q-score { font-size: 0.9rem; font-weight: 600; color: #e2e8f0; }
    .quality-meta .q-summary { font-size: 0.8rem; color: #94a3b8; margin-top: 2px; line-height: 1.4; }

    .quality-issue {
      display: flex;
      gap: 8px;
      padding: 7px 12px;
      margin-bottom: 5px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 7px;
      font-size: 0.78rem;
    }

    .issue-type {
      flex-shrink: 0;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.7rem;
      align-self: flex-start;
      margin-top: 1px;
    }

    .issue-type.VAGUE_LANGUAGE    { background: #422006; color: #fb923c; }
    .issue-type.MISSING_SPECIFICS { background: #1e1b4b; color: #a5b4fc; }
    .issue-type.FABRICATED        { background: #3b0764; color: #e879f9; }

    .issue-body { flex: 1; color: #94a3b8; line-height: 1.5; }
    .issue-excerpt { color: #cbd5e1; font-style: italic; }
    .issue-suggestion { color: #64748b; font-size: 0.75rem; margin-top: 2px; }

    #downloadBtn {
      display: none;
      width: 100%;
      background: #22c55e;
      color: #fff;
      padding: 13px;
      font-size: 0.95rem;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    #downloadBtn.visible {
      display: flex;
    }

    #downloadBtn:hover {
      opacity: 0.88;
    }

    .icon {
      font-style: normal;
    }

  </style>
</head>
<body>

  <header>
    <h1>Brand Market Analysis Agent</h1>
    <p>AI-powered brand intelligence &amp; PDF reporting</p>
  </header>

  <div class="card">

    <!-- Input -->
    <div class="input-group">
      <input
        type="text"
        id="brandInput"
        placeholder="Enter brand name, e.g. Luckin Coffee"
        autocomplete="off"
      />
      <button id="startBtn" onclick="startAnalysis()">Start Analysis</button>
    </div>

    <!-- Loading status -->
    <div id="statusArea">
      <div class="spinner"></div>
      <div style="flex:1">
        <div id="statusText">Collecting data...</div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
      </div>
    </div>

    <!-- Results -->
    <div id="resultsSection">
      <h2>Analysis Preview</h2>
      <div id="resultsPreview"></div>

      <div id="scoreBreakdown">
        <h3>Sentiment Score Breakdown</h3>
        <div id="scoreRows"></div>
      </div>

      <div id="trendRationale">
        <h3>Market Trend Rationale</h3>
        <div id="trendRows"></div>
        <div class="trend-verdict" id="trendVerdict"></div>
      </div>

      <div id="qualityReport">
        <h3>Data Quality Audit</h3>
        <div id="qualityHeader"></div>
        <div id="qualityIssues"></div>
      </div>

      <button id="downloadBtn" onclick="downloadPDF()">
        <span class="icon">&#8675;</span> Download PDF Report
      </button>
    </div>

  </div>

  <script>
    const STEPS = [
      { label: "Collecting data...",       progress: 30 },
      { label: "Running Analysis...",      progress: 65 },
      { label: "Generating PDF Report...", progress: 90 },
    ];

    let stepTimer   = null;
    let currentStep = 0;
    let downloadUrl = "";

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("brandInput").addEventListener("keydown", e => {
        if (e.key === "Enter") startAnalysis();
      });
    });

    // ── UI helpers ──────────────────────────────────────────────────────────
    function setStep(i) {
      document.getElementById("statusText").textContent = STEPS[i].label;
      document.getElementById("progressFill").style.width = STEPS[i].progress + "%";
    }

    function resetUI() {
      clearInterval(stepTimer);
      currentStep = 0;
      downloadUrl = "";
      document.getElementById("startBtn").disabled = false;
      document.getElementById("statusArea").classList.remove("active");
      document.getElementById("progressFill").style.width = "0%";
      document.getElementById("scoreBreakdown").classList.remove("visible");
      document.getElementById("trendRationale").classList.remove("visible");
      document.getElementById("qualityReport").classList.remove("visible");
    }

    async function startAnalysis() {
      const brand = document.getElementById("brandInput").value.trim();
      if (!brand) { document.getElementById("brandInput").focus(); return; }

      // Reset
      document.getElementById("startBtn").disabled = true;
      document.getElementById("resultsSection").classList.remove("visible");
      document.getElementById("downloadBtn").classList.remove("visible");
      document.getElementById("resultsPreview").textContent = "";
      currentStep = 0;

      // Animate status while waiting
      document.getElementById("statusArea").classList.add("active");
      setStep(0);
      stepTimer = setInterval(() => {
        if (currentStep < STEPS.length - 1) {
          currentStep++;
          setStep(currentStep);
        }
      }, 3500);

      try {
        const res  = await fetch("/analyze", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ brand }),
        });
        const data = await res.json();

        clearInterval(stepTimer);

        if (!res.ok || !data.success) {
          const err = new Error(data.error || "Unknown server error.");
          if (data.brandNotFound) { err.brandNotFound = true; err.brandName = brand; }
          throw err;
        }

        // Complete progress bar
        document.getElementById("progressFill").style.width = "100%";
        downloadUrl = data.downloadUrl;

        setTimeout(() => {
          document.getElementById("statusArea").classList.remove("active");
          document.getElementById("startBtn").disabled = false;

          const p = data.preview;
          const trendArrow = { growing: "↑", stable: "→", declining: "↓" }[p.marketTrend] || "";
          const lines = [
            `Brand: ${data.brand}`,
            `Sentiment Score: ${p.sentimentScore} / 100`,
            `Market Trend: ${trendArrow} ${p.marketTrend.toUpperCase()}`,
            ``,
            `Pricing: ${p.priceSummary}`,
            ``,
            `Competitive: ${p.competitiveSummary}`,
            ``,
            `Strategic Insights:`,
            ...p.strategicInsights.map((s) => `  • ${s}`),
            ``,
            `Recommendations:`,
            ...p.recommendations.map((r) => `  • ${r}`),
          ];

          document.getElementById("resultsPreview").textContent = lines.join("\n");

          // Render sentiment breakdown
          const bd = p.sentimentBreakdown || {};
          const LABELS = {
            consumerReputation:   "Consumer Reputation",
            marketPerformance:    "Market Performance",
            brandAwareness:       "Brand Awareness",
            priceCompetitiveness: "Price Competitiveness",
            channelCoverage:      "Channel Coverage",
          };
          const rows = Object.entries(LABELS).map(([key, label]) => {
            const dim = bd[key] || {};
            const score = dim.score ?? 0;
            const weight = dim.weight ? `×${(dim.weight * 100).toFixed(0)}%` : "";
            return `<div class="score-row">
              <span class="score-label">${label}</span>
              <div class="score-bar-track"><div class="score-bar-fill" style="width:${score}%"></div></div>
              <span class="score-num">${score}</span>
              <span class="score-weight">${weight}</span>
            </div>`;
          }).join("");
          document.getElementById("scoreRows").innerHTML = rows;
          document.getElementById("scoreBreakdown").classList.add("visible");

          // Render market trend rationale
          const tr = p.marketTrendRationale || {};
          const TREND_LABELS = {
            revenueGrowth:    "Revenue Growth",
            expansionSignals: "Expansion Signals",
            marketShare:      "Market Share",
            demandSignals:    "Demand Signals",
          };
          const trendRows = Object.entries(TREND_LABELS).map(([key, label]) =>
            `<div class="trend-row">
              <span class="trend-indicator">${label}</span>
              <span class="trend-detail">${tr[key] || "—"}</span>
            </div>`
          ).join("");
          document.getElementById("trendRows").innerHTML = trendRows;
          document.getElementById("trendVerdict").textContent = tr.verdict || "";
          document.getElementById("trendRationale").classList.add("visible");

          // Render data quality report
          const qr = p.qualityReport || {};
          const unavailable = qr.unavailable ?? false;
          const score = qr.qualityScore ?? "—";
          const passed = qr.passed ?? false;
          const retried = qr.wasRetried ?? false;
          const statusClass = unavailable ? "retry" : (passed ? "pass" : "warn");
          const statusIcon  = unavailable ? "?" : (passed ? "✓" : "⚠");
          const retryNote   = retried ? ' <span style="color:#60a5fa;font-size:0.75rem">(auto-retried)</span>' : "";

          document.getElementById("qualityHeader").innerHTML = `
            <div class="quality-header ${statusClass}">
              <div class="quality-badge ${statusClass}">${statusIcon} ${score}</div>
              <div class="quality-meta">
                <div class="q-score">${passed ? "Quality Check Passed" : "Quality Warnings Detected"}${retryNote}</div>
                <div class="q-summary">${qr.summary || ""}</div>
              </div>
            </div>`;

          const issues = (qr.issues || []).slice(0, 8);
          document.getElementById("qualityIssues").innerHTML = issues.map(i => `
            <div class="quality-issue">
              <span class="issue-type ${i.type}">${i.type.replace(/_/g," ")}</span>
              <div class="issue-body">
                <div class="issue-excerpt">"${i.excerpt}"</div>
                <div class="issue-suggestion">→ ${i.suggestion}</div>
              </div>
            </div>`).join("");

          document.getElementById("qualityReport").classList.add("visible");

          document.getElementById("resultsSection").classList.add("visible");
          document.getElementById("downloadBtn").classList.add("visible");
        }, 500);

      } catch (err) {
        clearInterval(stepTimer);
        resetUI();
        document.getElementById("statusArea").classList.add("active");
        document.getElementById("progressFill").style.width = "0%";
        if (err.brandNotFound) {
          document.getElementById("statusText").textContent =
            `⚠️ Brand not recognised: "${err.brandName}". Please check the spelling or try a different brand.`;
        } else {
          document.getElementById("statusText").textContent = "Error: " + err.message;
        }
        setTimeout(resetUI, 6000);
      }
    }

    function downloadPDF() {
      if (downloadUrl) window.open(downloadUrl, "_blank");
    }
  </script>

</body>
</html>
